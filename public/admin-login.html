<!DOCTYPE html>
<html>
<head>
    <title>Admin Login - Songhai HMO</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .login-container {
            background: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            width: 400px;
        }
        h1 {
            color: #1a73e8;
            margin-bottom: 10px;
            text-align: center;
        }
        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
        }
        input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 14px;
        }
        button {
            width: 100%;
            padding: 12px;
            background: #1a73e8;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
            margin-top: 10px;
        }
        button:hover {
            background: #1557b0;
        }
        .error-msg {
            background: #ffebee;
            color: #c62828;
            padding: 10px;
            border-radius: 5px;
            margin-bottom: 15px;
            display: none;
        }
        .info-box {
            background: #e3f2fd;
            padding: 15px;
            border-radius: 5px;
            margin-bottom: 20px;
            font-size: 14px;
        }
        .info-box p {
            margin: 5px 0;
        }
        .links {
            text-align: center;
            margin-top: 20px;
        }
        .links a {
            color: #1a73e8;
            text-decoration: none;
            margin: 0 10px;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <h1>🏥 Songhai HMO</h1>
        <div class="subtitle">Admin Portal Login</div>
        
        <div class="info-box">
            <strong>Test Credentials:</strong>
            <p>Username: admin<br>Password: admin123</p>
            <p style="margin-top: 10px;">Username: viewer<br>Password: viewer123 (Read-only)</p>
        </div>
        
        <div id="errorMsg" class="error-msg"></div>
        
        <input type="text" id="username" placeholder="Username or Email" autocomplete="off">
        <input type="password" id="password" placeholder="Password">
        <button onclick="login()">Login to Admin Portal</button>
        
        <div class="links">
           <a href="/homepage.html">🏠 Back to Homepage</a>
            <a href="/provider.html">Provider Portal →</a>
            <a href="/callcentre.html">Call Centre →</a>
        </div>
    </div>

    <script>
        async function login() {
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const errorMsg = document.getElementById('errorMsg');
            
            if (!username || !password) {
                errorMsg.innerText = 'Please enter username and password';
                errorMsg.style.display = 'block';
                return;
            }
            
            try {
                const res = await fetch('/api/admin/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password }),
                    credentials: 'include'
                });
                
                if (res.ok) {
                    const data = await res.json();
                    window.location.href = '/index.html';
                } else {
                    const error = await res.json();
                    errorMsg.innerText = error.error || 'Login failed';
                    errorMsg.style.display = 'block';
                }
            } catch (error) {
                errorMsg.innerText = 'Connection error: ' + error.message;
                errorMsg.style.display = 'block';
            }
        }
        
        document.getElementById('password').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                login();
            }
        });
    </script>
</body>
</html>
